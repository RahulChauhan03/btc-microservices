spring.application.name=api-gateway
server.port=8080
spring.config.import=optional:configserver:http://localhost:8888
spring.main.web-application-type=reactive

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

springdoc.swagger-ui.urls[0].name=User Service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Expense Service
springdoc.swagger-ui.urls[1].url=/expense-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Claim Service
springdoc.swagger-ui.urls[2].url=/claim-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Trip Service
springdoc.swagger-ui.urls[3].url=/trip-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=Payment Service
springdoc.swagger-ui.urls[4].url=/payment-service/v3/api-docs
springdoc.swagger-ui.urls[5].name=Notification Service
springdoc.swagger-ui.urls[5].url=/notification-service/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true
